name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck all packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared (required by extension and backend)
        run: pnpm --filter @covergeist/shared build

      - name: Typecheck all packages
        run: pnpm -r typecheck

  package-extension:
    name: Package VS Code extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @covergeist/shared build

      - name: Build extension
        run: pnpm --filter covergeist build

      - name: Package extension (.vsix)
        working-directory: extension
        run: pnpm run package

      - name: Upload .vsix as artifact
        uses: actions/upload-artifact@v4
        with:
          name: covergeist-extension
          path: extension/covergeist-*.vsix
          retention-days: 7
